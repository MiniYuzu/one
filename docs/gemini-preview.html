<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE AI Agent — Gemini Design Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] },
      animation: { 'spin-slow': 'spin 2s linear infinite' }
    }
  }
}
</script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .lucide { width: 1em; height: 1em; }
  /* Custom scrollbar for webkit */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .dark ::-webkit-scrollbar-thumb { background: #475569; }
  /* Dropdown animation */
  .dropdown-enter { animation: zoomIn .1s ease-out forwards; }
  @keyframes zoomIn { from { opacity:0; transform: scale(.95); } to { opacity:1; transform: scale(1); } }
  /* Plan card transition */
  .plan-enter { animation: fadeUp .5s ease-out forwards; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body class="antialiased">
<div id="app-root"></div>

<script>
/* ===== State ===== */
const state = {
  isLeftOpen: true,
  isRightOpen: true,
  isDarkMode: false,
  planStatus: 'pending',
  isThoughtOpen: true,
  showModeDropdown: false,
  showModelDropdown: false,
  workMode: 'Plan',
  selectedModel: 'Minimax 2.5',
  rightTab: 'files',
  inputText: ''
};

const WORKSPACES = [
  { id: 1, name: '四月销售数据分析', date: '今天', active: true },
  { id: 2, name: 'Q1 财务报表核算', date: '昨天', active: false },
  { id: 3, name: '新员工入职培训PPT', date: '3天前', active: false },
];

const ARTIFACTS = [
  { id: 1, name: '四月销售趋势分析.docx', type: 'word', size: '1.2 MB', time: '10:42' },
  { id: 2, name: '清洗后_源数据.xlsx', type: 'excel', size: '3.4 MB', time: '10:41' },
];

const MODELS = ['Minimax 2.5', 'GPT-4o (内网)', 'Claude 3.5'];
const MODES = [
  { id: 'Ask', icon: 'message-circle', name: '问一问', desc: '纯对话，只读安全模式', color: 'text-slate-600 dark:text-slate-400', bg: 'bg-slate-100/60 dark:bg-slate-700/60', hover: 'hover:bg-slate-200/60 dark:hover:bg-slate-600/80' },
  { id: 'Plan', icon: 'brain-circuit', name: '想一想', desc: '拟定计划，需人工确认', color: 'text-amber-700 dark:text-amber-300', bg: 'bg-amber-50 dark:bg-amber-500/20', hover: 'hover:bg-amber-100 dark:hover:bg-amber-500/30' },
  { id: 'Craft', icon: 'zap', name: '做一做', desc: '全自动执行，无需确认', color: 'text-indigo-700 dark:text-indigo-300', bg: 'bg-indigo-50 dark:bg-indigo-500/20', hover: 'hover:bg-indigo-100 dark:hover:bg-indigo-500/30' },
];

/* ===== Icons helper ===== */
function icon(name, cls='') {
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

/* ===== Render ===== */
function render() {
  const root = document.getElementById('app-root');
  document.documentElement.classList.toggle('dark', state.isDarkMode);

  root.innerHTML = `
    <div class="${state.isDarkMode ? 'dark' : ''}">
      <div class="flex h-screen bg-slate-100 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100 overflow-hidden transition-colors duration-300">
        ${SidebarLeft()}
        ${MainChat()}
        ${SidebarRight()}
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

function SidebarLeft() {
  const w = state.isLeftOpen ? 'w-64' : 'w-[68px]';
  const logoText = state.isLeftOpen ? 'opacity-100' : 'opacity-0 w-0';
  const listVisible = state.isLeftOpen ? 'opacity-100 h-auto' : 'opacity-0 h-0 hidden';
  return `
    <div class="transition-all duration-300 ease-in-out flex flex-col h-screen bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex-shrink-0 z-20 ${w}">
      <div class="h-14 border-b border-slate-200 dark:border-slate-800 flex items-center transition-all duration-300 ${state.isLeftOpen ? 'px-4 justify-between' : 'justify-center'}">
        <div class="flex items-center space-x-2 text-indigo-600 dark:text-indigo-400 font-bold text-lg overflow-hidden whitespace-nowrap">
          ${icon('bot', 'w-5 h-5 flex-shrink-0')}
          <span class="transition-opacity duration-300 ${logoText}">AI Agent</span>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto overflow-x-hidden py-3 flex flex-col">
        <div class="px-2 space-y-1 mb-4">
          ${navBtn('plus', '新建工作区', 'text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10')}
          ${navBtn('search', '全局搜索', 'text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800')}
          ${navBtn('folder-kanban', '我的工作区', 'text-indigo-600 dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-500/10')}
          ${navBtn('wrench', '本地工具库', 'text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800')}
        </div>
        <div class="transition-all duration-300 flex flex-col flex-1 overflow-hidden ${listVisible}">
          <div class="text-xs font-semibold text-slate-400 dark:text-slate-500 mb-2 mt-2 px-5 uppercase tracking-wider">最近打开</div>
          <div class="space-y-0.5 px-2 flex-1 overflow-y-auto">
            ${WORKSPACES.map(ws => `
              <div title="${ws.name}" class="rounded-md cursor-pointer flex items-center px-3 py-2 transition group ${ws.active ? 'bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-indigo-600 dark:text-indigo-400' : 'hover:bg-slate-200/50 dark:hover:bg-slate-800 border border-transparent text-slate-600 dark:text-slate-400'}">
                <div class="flex items-center space-x-2.5 overflow-hidden">
                  ${icon('folder-open', `w-4 h-4 flex-shrink-0 ${ws.active ? 'text-indigo-500 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'}`)}
                  <span class="text-sm truncate">${ws.name}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="p-2 border-t border-slate-200 dark:border-slate-800">
        <button class="flex items-center ${state.isLeftOpen ? 'px-3 py-2 space-x-3 w-full' : 'p-3 justify-center mx-auto'} text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-800 rounded-lg transition">
          ${icon('settings', 'w-5 h-5 flex-shrink-0')}
          <span class="text-sm font-medium whitespace-nowrap transition-all duration-300 ${logoText}">系统设置</span>
        </button>
      </div>
    </div>
  `;
}

function navBtn(ico, label, cls) {
  return `
    <button class="flex items-center ${state.isLeftOpen ? 'px-3 py-2 space-x-3 w-full' : 'p-3 justify-center mx-auto'} ${cls} rounded-lg transition group">
      ${icon(ico, 'w-5 h-5 flex-shrink-0')}
      <span class="text-sm font-medium whitespace-nowrap transition-all duration-300 ${state.isLeftOpen ? 'opacity-100 w-auto' : 'opacity-0 w-0 hidden'}">${label}</span>
    </button>
  `;
}

function MainChat() {
  const modeCfg = MODES.find(m => m.id === state.workMode);
  return `
    <div class="flex-1 flex flex-col h-full bg-white dark:bg-[#0F172A] relative min-w-0 shadow-[0_0_15px_-3px_rgba(0,0,0,0.05)] dark:shadow-none border-x border-transparent dark:border-slate-800 z-10 transition-colors duration-300">
      <div class="h-14 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between px-3 bg-white dark:bg-[#0F172A] z-20 transition-colors duration-300">
        <div class="flex items-center space-x-2 overflow-hidden">
          <button onclick="toggleLeft()" class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition">
            ${icon('menu', 'w-5 h-5')}
          </button>
          <div class="flex items-center text-sm whitespace-nowrap overflow-hidden">
            <span class="font-semibold text-slate-800 dark:text-slate-200 truncate" title="四月销售数据分析">四月销售数据分析</span>
          </div>
        </div>
        <div class="flex items-center space-x-3 flex-shrink-0">
          <div class="flex items-center space-x-1.5 text-xs bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 px-2 py-1 rounded-md border border-emerald-100 dark:border-emerald-500/20 font-medium">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
            <span>直连</span>
          </div>
          <div class="w-px h-4 bg-slate-200 dark:bg-slate-700"></div>
          <button onclick="toggleDark()" class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-amber-500 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition">
            ${icon(state.isDarkMode ? 'sun' : 'moon', 'w-4 h-4')}
          </button>
          <button onclick="toggleRight()" class="p-1.5 rounded-md transition border ${state.isRightOpen ? 'bg-indigo-50 dark:bg-indigo-500/10 border-indigo-100 dark:border-indigo-500/20 text-indigo-600 dark:text-indigo-400' : 'border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}">
            ${icon('panel-right', 'w-5 h-5')}
          </button>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 pb-48 scroll-smooth">
        <div class="flex justify-end group">
          <div class="bg-indigo-600 dark:bg-indigo-500 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] sm:max-w-xl shadow-sm text-sm leading-relaxed relative">
            帮我分析一下刚才拖进去的销售数据 CSV，提取 Top 10 客户，然后生成一份带排版的 Word 总结报告。
            <div class="absolute top-1 right-[102%] opacity-0 group-hover:opacity-100 transition-opacity flex flex-col space-y-1">
              <button class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 rounded-md transition">
                ${icon('copy', 'w-3.5 h-3.5')}
              </button>
            </div>
          </div>
        </div>

        <div class="flex items-start space-x-3 group">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-100 to-white dark:from-indigo-900/50 dark:to-slate-800 flex items-center justify-center flex-shrink-0 border border-indigo-200 dark:border-indigo-500/30 shadow-sm mt-0.5">
            ${icon('bot', 'w-4 h-4 text-indigo-600 dark:text-indigo-400')}
          </div>
          <div class="flex-1 space-y-3 max-w-2xl min-w-0">
            ${ThinkingChain()}
            ${PlanCard()}
            ${state.planStatus === 'approved' ? `
              <div class="plan-enter relative">
                <div class="text-slate-800 dark:text-slate-200 text-sm leading-relaxed">
                  报告已生成完毕！我提取了销售额排名前十的客户数据，并使用了标准的行内公文格式为您排版了 Word 文档。您现在可以在右侧的面板中直接打开或预览。
                </div>
                <div class="flex items-center space-x-1 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded transition" title="复制结果">${icon('copy', 'w-3.5 h-3.5')}</button>
                  <button class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded transition" title="重新生成">${icon('rotate-ccw', 'w-3.5 h-3.5')}</button>
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      </div>

      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white/90 dark:from-[#0F172A] dark:via-[#0F172A]/90 to-transparent pt-12 pb-6 px-4 sm:px-8 z-30 pointer-events-none transition-colors duration-300">
        <div class="max-w-3xl mx-auto shadow-2xl shadow-slate-300/40 dark:shadow-black/60 rounded-[20px] pointer-events-auto bg-white dark:bg-slate-800 border border-slate-200/80 dark:border-slate-700/80 flex flex-col focus-within:ring-4 focus-within:ring-indigo-50 dark:focus-within:ring-indigo-500/10 focus-within:border-indigo-300 dark:focus-within:border-indigo-500/50 transition-all duration-300">
          <div class="px-3 pt-3 pb-0 flex flex-wrap gap-2">
            <div class="flex items-center space-x-1 bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100/60 dark:border-emerald-500/20 rounded-md px-2 py-1 max-w-[200px] group transition-colors">
              ${icon('file-spreadsheet', 'w-3.5 h-3.5 text-emerald-600 dark:text-emerald-400 flex-shrink-0')}
              <span class="text-xs text-emerald-800 dark:text-emerald-300 font-medium truncate">raw_sales_data.csv</span>
              <button class="opacity-0 group-hover:opacity-100 text-emerald-400 dark:text-emerald-500 hover:text-rose-500 dark:hover:text-rose-400 transition ml-0.5">${icon('x', 'w-3.5 h-3.5')}</button>
            </div>
          </div>

          <div class="relative px-1">
            <textarea rows="2" oninput="setInput(this.value)" class="w-full resize-none bg-transparent border-0 focus:ring-0 px-3 py-2.5 text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 text-[15px] leading-relaxed outline-none"
              placeholder="描述需求，使用 @ 引用文件或对话...">${state.inputText}</textarea>
          </div>

          <div class="flex items-center justify-between px-2 pb-2 pt-1 border-t border-slate-50/50 dark:border-slate-700/50 mt-1">
            <div class="flex items-center space-x-1.5">
              <div class="relative" id="mode-wrap">
                <button onclick="toggleModeDropdown()" class="flex items-center space-x-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition ${modeCfg.bg} ${modeCfg.color} ${modeCfg.hover}">
                  ${icon(modeCfg.icon, 'w-3.5 h-3.5')}
                  <span>${state.workMode}</span>
                  ${icon('chevron-down', 'w-3 h-3 opacity-50')}
                </button>
                ${state.showModeDropdown ? `
                  <div class="absolute bottom-full left-0 mb-2 w-52 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl py-1.5 z-50 overflow-hidden origin-bottom-left dropdown-enter">
                    ${MODES.map(m => `
                      <button onclick="selectMode('${m.id}')" class="w-full text-left px-3 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition flex flex-col ${state.workMode === m.id ? 'bg-indigo-50/40 dark:bg-indigo-500/10' : ''}">
                        <div class="flex items-center space-x-2">
                          ${icon(m.icon, `w-4 h-4 ${m.color}`)}
                          <span class="font-semibold text-sm text-slate-800 dark:text-slate-200">${m.id}</span>
                          <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">(${m.name})</span>
                        </div>
                        <span class="text-[11px] text-slate-500 dark:text-slate-400 mt-1 ml-6">${m.desc}</span>
                      </button>
                    `).join('')}
                  </div>
                ` : ''}
              </div>

              <div class="relative" id="model-wrap">
                <button onclick="toggleModelDropdown()" class="flex items-center space-x-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100/60 dark:hover:bg-slate-700/60 transition">
                  ${icon('cpu', 'w-3.5 h-3.5 opacity-70')}
                  <span>${state.selectedModel}</span>
                  ${icon('chevron-down', 'w-3 h-3 opacity-40')}
                </button>
                ${state.showModelDropdown ? `
                  <div class="absolute bottom-full left-0 mb-2 w-48 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl py-1.5 z-50 origin-bottom-left dropdown-enter">
                    ${MODELS.map(m => `
                      <button onclick="selectModel('${m}')" class="w-full text-left px-3 py-2 text-sm transition flex items-center justify-between ${state.selectedModel === m ? 'text-indigo-600 dark:text-indigo-400 font-medium bg-indigo-50/50 dark:bg-indigo-500/10' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}">
                        <span>${m}</span>
                        ${state.selectedModel === m ? icon('check-circle-2', 'w-3.5 h-3.5') : ''}
                      </button>
                    `).join('')}
                  </div>
                ` : ''}
              </div>

              <div class="h-3.5 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>

              <button class="flex items-center space-x-1 px-2.5 py-1.5 rounded-lg text-xs font-medium text-slate-500 dark:text-slate-400 hover:bg-slate-100/60 dark:hover:bg-slate-700/60 transition">
                ${icon('at-sign', 'w-3.5 h-3.5')}
                <span class="hidden sm:inline">引入</span>
              </button>
              <button class="p-1.5 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100/60 dark:hover:bg-slate-700/60 rounded-md transition">
                ${icon('paperclip', 'w-4 h-4')}
              </button>
            </div>

            <button class="flex items-center justify-center p-2 rounded-xl transition ${state.inputText ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/20 hover:bg-indigo-700 hover:-translate-y-0.5' : 'bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed'}">
              ${icon('send', 'w-4 h-4 ml-0.5')}
            </button>
          </div>
        </div>

        <div class="text-center mt-3 text-[11px] text-slate-400 dark:text-slate-500 font-medium">
          AI 可能会犯错。处理涉及财务或敏感数据前，请核实生成内容。
        </div>
      </div>
    </div>
  `;
}

function ThinkingChain() {
  const content = state.isThoughtOpen ? 'max-h-64 opacity-100' : 'max-h-0 opacity-0 border-t-0';
  return `
    <div class="border border-slate-200 dark:border-slate-700/60 rounded-xl overflow-hidden bg-slate-50/50 dark:bg-slate-800/30">
      <button onclick="toggleThought()" class="w-full flex items-center justify-between px-3 py-2 text-xs font-medium text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/80 transition-colors">
        <div class="flex items-center space-x-2">
          ${icon('brain-circuit', 'w-3.5 h-3.5')}
          <span>执行过程 (3 步)</span>
        </div>
        ${icon('chevron-up', `w-3.5 h-3.5 transition-transform duration-300 ${state.isThoughtOpen ? '' : 'rotate-180'}`)}
      </button>
      <div class="transition-all duration-300 ease-in-out border-t border-slate-200 dark:border-slate-700/60 bg-white dark:bg-slate-800/50 ${content}">
        <div class="p-3 space-y-2.5">
          <div class="flex items-center justify-between text-xs">
            <div class="flex items-center space-x-2 text-slate-600 dark:text-slate-300">
              ${icon('check-circle-2', 'w-3.5 h-3.5 text-emerald-500 dark:text-emerald-400')}
              <span>读取 <code class="bg-slate-100 dark:bg-slate-900 px-1 py-0.5 rounded border border-slate-200 dark:border-slate-700 font-mono">raw_sales_data.csv</code></span>
            </div>
            <span class="text-slate-400 dark:text-slate-500">0.2s</span>
          </div>
          <div class="flex items-center justify-between text-xs">
            <div class="flex items-center space-x-2 text-slate-600 dark:text-slate-300">
              ${icon('check-circle-2', 'w-3.5 h-3.5 text-emerald-500 dark:text-emerald-400')}
              <span>数据清洗与透视分析</span>
            </div>
            <span class="text-slate-400 dark:text-slate-500">1.4s</span>
          </div>
          ${state.planStatus === 'pending' ? `
            <div class="flex items-center justify-between text-xs">
              <div class="flex items-center space-x-2 text-indigo-600 dark:text-indigo-400 font-medium">
                ${icon('loader-2', 'w-3.5 h-3.5 animate-spin')}
                <span>挂起：等待计划审批...</span>
              </div>
            </div>
          ` : state.planStatus === 'approved' ? `
            <div class="flex items-center justify-between text-xs">
              <div class="flex items-center space-x-2 text-slate-600 dark:text-slate-300">
                ${icon('check-circle-2', 'w-3.5 h-3.5 text-emerald-500 dark:text-emerald-400')}
                <span>生成最终 Word 排版</span>
              </div>
              <span class="text-slate-400 dark:text-slate-500">2.1s</span>
            </div>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

function PlanCard() {
  const pending = state.planStatus === 'pending';
  const approved = state.planStatus === 'approved';
  const rejected = state.planStatus === 'rejected';
  return `
    <div class="my-2 bg-amber-50 dark:bg-amber-900/10 border border-amber-200/60 dark:border-amber-700/30 rounded-xl overflow-hidden shadow-sm max-w-2xl">
      <div class="bg-amber-100/40 dark:bg-amber-800/20 px-4 py-2.5 border-b border-amber-100 dark:border-amber-700/30 flex items-center justify-between">
        <div class="flex items-center space-x-2">
          ${icon('alert-circle', 'w-4 h-4 text-amber-600 dark:text-amber-400')}
          <span class="font-semibold text-amber-900 dark:text-amber-300 text-sm tracking-wide">执行计划待确认</span>
        </div>
      </div>
      <div class="p-4">
        <p class="text-sm text-slate-700 dark:text-slate-300 mb-4 font-medium">为了生成最终报告，我需要调用本地权限执行以下操作：</p>
        <div class="space-y-2 mb-5 bg-white dark:bg-slate-800/80 p-3 rounded-lg border border-amber-100/50 dark:border-amber-700/20">
          <div class="flex items-start space-x-2 text-sm text-slate-600 dark:text-slate-300">
            ${icon('check-circle-2', 'w-4 h-4 text-emerald-500 dark:text-emerald-400 mt-0.5 flex-shrink-0')}
            <span>提取销售额前 10 的客户数据，并清洗异常值。</span>
          </div>
          <div class="flex items-start space-x-2 text-sm text-slate-600 dark:text-slate-300">
            ${icon('check-circle-2', 'w-4 h-4 text-emerald-500 dark:text-emerald-400 mt-0.5 flex-shrink-0')}
            <span>在当前工作区覆写生成 <code class="bg-slate-50 dark:bg-slate-900 px-1.5 py-0.5 rounded text-indigo-600 dark:text-indigo-400 border border-slate-200 dark:border-slate-700 text-xs font-mono">四月销售趋势分析.docx</code>。</span>
          </div>
        </div>
        ${pending ? `
          <div class="flex space-x-3">
            <button onclick="setPlan('approved')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-lg text-sm font-medium transition shadow-sm border border-amber-600/20">批准执行</button>
            <button onclick="setPlan('rejected')" class="flex-1 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 py-2 rounded-lg text-sm font-medium transition">拒绝</button>
          </div>
        ` : approved ? `
          <div class="flex items-center space-x-2 text-emerald-600 dark:text-emerald-400 text-sm font-medium">
            ${icon('check-circle-2', 'w-4 h-4')}
            <span>执行已获授权。</span>
          </div>
        ` : rejected ? `
          <div class="flex items-center space-x-2 text-rose-600 dark:text-rose-400 text-sm font-medium">
            ${icon('x-circle', 'w-4 h-4')}
            <span>执行已被拒绝。</span>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function SidebarRight() {
  const w = state.isRightOpen ? 'w-[320px]' : 'w-0 overflow-hidden border-none opacity-0';
  return `
    <div class="transition-all duration-300 ease-in-out flex flex-col h-screen bg-white dark:bg-[#0F172A] border-l border-slate-200 dark:border-slate-800 flex-shrink-0 ${w}">
      <div class="p-2 border-b border-slate-200 dark:border-slate-800 flex items-center min-w-[20rem] space-x-1 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur">
        <button onclick="setRightTab('files')" class="flex-1 py-1.5 text-sm rounded-md transition font-medium ${state.rightTab==='files' ? 'bg-white dark:bg-slate-800 shadow-sm text-slate-800 dark:text-slate-200' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 hover:bg-slate-100/50 dark:hover:bg-slate-800/50'}">产物文件</button>
        <button onclick="setRightTab('preview')" class="flex-1 py-1.5 text-sm rounded-md transition font-medium flex items-center justify-center space-x-1 ${state.rightTab==='preview' ? 'bg-white dark:bg-slate-800 shadow-sm text-slate-800 dark:text-slate-200' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 hover:bg-slate-100/50 dark:hover:bg-slate-800/50'}">
          ${icon('globe', 'w-3.5 h-3.5')} <span>在线预览</span>
        </button>
      </div>
      <div class="p-4 flex-1 overflow-y-auto bg-slate-50 dark:bg-[#0B1120] min-w-[20rem]">
        ${state.rightTab === 'files' ? `
          <div class="text-xs font-semibold text-slate-400 dark:text-slate-500 mb-3 uppercase tracking-wider flex justify-between items-center">
            <span>生成结果</span>
            <span class="text-slate-400 dark:text-slate-500">${ARTIFACTS.length} 个文件</span>
          </div>
          <div class="space-y-3">
            ${ARTIFACTS.map(file => `
              <div class="bg-white dark:bg-slate-800 p-3 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col group hover:border-indigo-200 dark:hover:border-indigo-500/50 transition-colors">
                <div class="flex items-start space-x-3 mb-3">
                  ${file.type === 'excel'
                    ? icon('file-spreadsheet', 'w-8 h-8 text-emerald-500 dark:text-emerald-400 flex-shrink-0')
                    : icon('file-text', 'w-8 h-8 text-blue-500 dark:text-blue-400 flex-shrink-0')}
                  <div class="overflow-hidden flex-1">
                    <div class="text-sm font-medium text-slate-800 dark:text-slate-200 truncate" title="${file.name}">${file.name}</div>
                    <div class="text-xs text-slate-400 dark:text-slate-500 mt-1">${file.size} • ${file.time}</div>
                  </div>
                </div>
                <div class="flex space-x-2 pt-2 border-t border-slate-50 dark:border-slate-700/50 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button onclick="setRightTab('preview')" class="flex-1 bg-indigo-50 dark:bg-indigo-500/10 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-700 dark:text-indigo-400 text-xs py-1.5 rounded flex items-center justify-center space-x-1 font-medium transition-colors">
                    ${icon('eye', 'w-3.5 h-3.5')} <span>预览</span>
                  </button>
                  <button class="flex-1 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 text-xs py-1.5 rounded flex items-center justify-center space-x-1 font-medium transition-colors">
                    ${icon('download', 'w-3.5 h-3.5')} <span>打开</span>
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        ` : `
          <div class="flex flex-col items-center justify-center h-full text-slate-400 dark:text-slate-500 space-y-4">
            <div class="w-16 h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center border border-slate-200 dark:border-slate-700 shadow-inner">
              ${icon('layout', 'w-8 h-8 stroke-1 text-slate-400 dark:text-slate-500')}
            </div>
            <div class="text-center">
              <p class="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">暂无渲染内容</p>
              <p class="text-xs text-slate-400 dark:text-slate-500 max-w-[200px]">请在文件列表中点击“预览”或等待 Agent 生成渲染视图。</p>
            </div>
          </div>
        `}
      </div>
    </div>
  `;
}

/* ===== Actions ===== */
function toggleLeft()  { state.isLeftOpen = !state.isLeftOpen; render(); }
function toggleRight() { state.isRightOpen = !state.isRightOpen; render(); }
function toggleDark()  { state.isDarkMode = !state.isDarkMode; render(); }
function setPlan(s)    { state.planStatus = s; render(); }
function toggleThought(){ state.isThoughtOpen = !state.isThoughtOpen; render(); }
function setRightTab(t){ state.rightTab = t; render(); }
function setInput(v)   { state.inputText = v; render(); }

function toggleModeDropdown() {
  state.showModeDropdown = !state.showModeDropdown;
  state.showModelDropdown = false;
  render();
}
function selectMode(m) {
  state.workMode = m;
  state.showModeDropdown = false;
  render();
}
function toggleModelDropdown() {
  state.showModelDropdown = !state.showModelDropdown;
  state.showModeDropdown = false;
  render();
}
function selectModel(m) {
  state.selectedModel = m;
  state.showModelDropdown = false;
  render();
}

/* ===== Click outside ===== */
document.addEventListener('mousedown', (e) => {
  const mw = document.getElementById('mode-wrap');
  const ml = document.getElementById('model-wrap');
  let changed = false;
  if (mw && !mw.contains(e.target) && state.showModeDropdown) { state.showModeDropdown = false; changed = true; }
  if (ml && !ml.contains(e.target) && state.showModelDropdown) { state.showModelDropdown = false; changed = true; }
  if (changed) render();
});

/* ===== Init ===== */
render();
</script>
</body>
</html>
